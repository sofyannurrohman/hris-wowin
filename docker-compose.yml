services:
  postgres:
    image: postgres:15-alpine
    container_name: hris_postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: hris_db
    ports:
      - "5321:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d hris_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hris_redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hris_backend
    ports:
      - "8081:8081"
    environment:
      - DB_HOST=postgres
      - DB_USER=root
      - DB_PASSWORD=secretpassword
      - DB_NAME=hris_db
      - DB_PORT=5432
      - SERVER_PORT=8081
      - JWT_SECRET=supersecretkey_dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
    container_name: hris_frontend
    ports:
      - "3000:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8081/api
    depends_on:
      - backend

volumes:
  pg-data:
  redis-data:
