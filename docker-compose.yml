services:
  postgres:
    image: postgres:15-alpine
    container_name: hris_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-root}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secretpassword}
      POSTGRES_DB: ${POSTGRES_DB:-hris_db}
    ports:
      - "127.0.0.1:5321:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-root} -d ${POSTGRES_DB:-hris_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hris_network

  redis:
    image: redis:7-alpine
    container_name: hris_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hris_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hris_backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      - DB_HOST=postgres
      - DB_USER=${POSTGRES_USER:-root}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-secretpassword}
      - DB_NAME=${POSTGRES_DB:-hris_db}
      - DB_PORT=5432
      - SERVER_PORT=8081
      - JWT_SECRET=${JWT_SECRET:-supersecretkey_production_change_me}
      - SKIP_SEED=${SKIP_SEED:-true}
      - MIDTRANS_SERVER_KEY=${MIDTRANS_SERVER_KEY}
      - MIDTRANS_CLIENT_KEY=${MIDTRANS_CLIENT_KEY}
      - MIDTRANS_MERCHANT_ID=${MIDTRANS_MERCHANT_ID}
      - MIDTRANS_IS_PRODUCTION=${MIDTRANS_IS_PRODUCTION:-false}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - hris_network

  frontend:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-/api}
    container_name: hris_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:80"
    networks:
      - hris_network

volumes:
  pg-data:
  redis-data:

networks:
  hris_network:
    driver: bridge
