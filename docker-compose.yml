services:
  postgres:
    image: postgres:15-alpine
    container_name: hris_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-root}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secretpassword}
      POSTGRES_DB: ${POSTGRES_DB:-hris_db}
    ports:
      - "127.0.0.1:5321:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-root} -d ${POSTGRES_DB:-hris_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hris_network

  redis:
    image: redis:7-alpine
    container_name: hris_redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hris_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hris_backend
    expose:
      - "8081"
    environment:
      - DB_HOST=postgres
      - DB_USER=${POSTGRES_USER:-root}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-secretpassword}
      - DB_NAME=${POSTGRES_DB:-hris_db}
      - DB_PORT=5432
      - SERVER_PORT=8081
      - JWT_SECRET=${JWT_SECRET:-supersecretkey_dev}
      - SKIP_SEED=${SKIP_SEED:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - hris_network

  frontend:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-/api}
    container_name: hris_frontend
    expose:
      - "80"
    networks:
      - hris_network

  nginx:
    image: nginx:stable-alpine
    container_name: hris_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/uploads:/app/uploads:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - hris_network

  certbot:
    image: certbot/certbot
    container_name: hris_certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - hris_network

volumes:
  pg-data:
  redis-data:
  certbot-etc:
  certbot-var:
  certbot-www:

networks:
  hris_network:
    driver: bridge
